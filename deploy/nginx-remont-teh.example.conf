# --- Connection refused к 127.0.0.1:8000 ---
# Убедитесь, что Gunicorn запущен и слушает тот же адрес/порт, что в proxy_pass.
# Если используете unix-сокет, в proxy_pass укажите unix:/path/to/gunicorn.sock;

