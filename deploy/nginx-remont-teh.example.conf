# Пример фрагментов для remont-teh.ru (скопировать в свой server { } или http { }).
# После правок: sudo nginx -t && sudo systemctl reload nginx

# --- Загрузки (ошибка "client intended to send too large body" при ~2 MB) ---
# По умолчанию у Nginx client_max_body_size = 1m — поднимите до 20M.
client_max_body_size 20M;
client_body_buffer_size 128k;

# --- Прокси к Gunicorn (таймауты при тяжёлых POST с фото) ---
proxy_connect_timeout 75s;
proxy_send_timeout 120s;
proxy_read_timeout 120s;

