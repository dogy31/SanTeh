{% extends 'main/base.html' %}
{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;">
    <div style="background: white; max-width: 420px; width: 100%; padding: 32px; border-radius: 28px; box-shadow: 0 20px 35px -8px rgba(0,20,40,0.2);">
        <h1 style="font-size: 28px; margin-bottom: 24px; color: #0b2b40; text-align: center;">🔐 Вход в систему</h1>
        <form method="post">
            {% csrf_token %}
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 14px; font-weight: 500; color: #1a4b5f; margin-bottom: 6px;">Телефон (логин)</label>
                <input type="tel" name="phone" class="phone-input" inputmode="tel" autocomplete="tel" maxlength="18" placeholder="+7 (___) ___-__-__" required style="width: 100%; padding: 12px 16px; border: 1px solid #cbd6e0; border-radius: 16px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 14px; font-weight: 500; color: #1a4b5f; margin-bottom: 6px;">Пароль</label>
                <input type="password" name="password" placeholder="••••••••" required style="width: 100%; padding: 12px 16px; border: 1px solid #cbd6e0; border-radius: 16px;">
            </div>
            <button type="submit" style="background: #2f7e9e; color: white; border: none; padding: 14px 20px; width: 100%; border-radius: 40px; font-size: 16px; font-weight: 600; cursor: pointer; box-shadow: 0 8px 18px -6px #2f7e9e80;">Войти</button>
            {% if error %}<div style="color: #c03c2b; text-align: center; margin-top: 12px;">{{ error }}</div>{% endif %}
        </form>
        <div style="text-align: center; margin-top: 24px; color: #4a6778;">
            <a href="{% url 'forgot_password' %}" style="color: #1d5f7a;">Забыли пароль?</a><br>
            Нет аккаунта? <a href="{% url 'register' %}" style="color: #1d5f7a;">Зарегистрироваться</a>
        </div>
    </div>
</div>
<script>
    function cleanPhoneDigits(value) {
        let digits = value.replace(/\D/g, '');
        if (!digits) return '';
        if (digits.startsWith('8')) digits = '7' + digits.slice(1);
        else if (digits.startsWith('9')) digits = '7' + digits;
        if (digits.length > 11) digits = digits.slice(0, 11);
        return digits;
    }
    function formatPhoneValue(value) {
        const digits = cleanPhoneDigits(value);
        if (!digits) return '';
        const core = digits.slice(1);
        if (core.length <= 3) return '+7 (' + core;
        if (core.length <= 6) return '+7 (' + core.slice(0, 3) + ') ' + core.slice(3);
        if (core.length <= 8) return '+7 (' + core.slice(0, 3) + ') ' + core.slice(3, 6) + '-' + core.slice(6);
        return '+7 (' + core.slice(0, 3) + ') ' + core.slice(3, 6) + '-' + core.slice(6, 8) + '-' + core.slice(8, 10);
    }
    function phoneMask(event) {
        const input = event.target;
        input.value = formatPhoneValue(input.value);
    }
    document.querySelectorAll('.phone-input').forEach(function(el) {
        el.addEventListener('input', phoneMask);
    });
</script>
{% endblock %}
