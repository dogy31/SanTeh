{% extends 'main/base.html' %}
{% block extra_head %}
<style>
    .form-container { max-width: 400px; margin: 50px auto; padding: 20px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    .form-container h2 { text-align: center; color: #0b2b40; margin-bottom: 20px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-weight: 500; color: #1d4f65; margin-bottom: 4px; }
    .field input { width: 100%; padding: 10px 14px; border: 1px solid #cbdae7; border-radius: 20px; font-size: 15px; background: #f9fcff; }
    .btn-primary { background: #2f7e9e; color: white; border: none; padding: 12px 28px; border-radius: 40px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; }
    .btn-primary:hover { background: #1f5f7a; }
    .links { text-align: center; margin-top: 20px; }
    .links a { color: #2f7e9e; text-decoration: none; }
    .links a:hover { text-decoration: underline; }
</style>
{% endblock %}

{% block content %}
<div class="form-container">
    <h2>🔐 Восстановление пароля</h2>
    {% if error %}
        <p style="color: red; text-align: center;">{{ error }}</p>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <div class="field">
            <label>Телефон</label>
            <input type="tel" name="phone" class="phone-input" inputmode="tel" autocomplete="tel" maxlength="18" placeholder="+7 (___) ___-__-__" required>
        </div>
        <button type="submit" class="btn-primary">Отправить код</button>
    </form>
    <div class="links">
        <a href="{% url 'login' %}">Вернуться к входу</a>
    </div>
</div>

<script>
    function cleanPhoneDigits(value) {
        let digits = value.replace(/\D/g, '');
        if (!digits) return '';
        if (digits.startsWith('8')) digits = '7' + digits.slice(1);
        else if (digits.startsWith('9')) digits = '7' + digits;
        if (digits.length > 11) digits = digits.slice(0, 11);
        return digits;
    }
    function formatPhoneValue(value) {
        const digits = cleanPhoneDigits(value);
        if (!digits) return '';
        const core = digits.slice(1);
        if (core.length <= 3) return '+7 (' + core;
        if (core.length <= 6) return '+7 (' + core.slice(0, 3) + ') ' + core.slice(3);
        if (core.length <= 8) return '+7 (' + core.slice(0, 3) + ') ' + core.slice(3, 6) + '-' + core.slice(6);
        return '+7 (' + core.slice(0, 3) + ') ' + core.slice(3, 6) + '-' + core.slice(6, 8) + '-' + core.slice(8, 10);
    }
    function phoneMask(event) {
        const input = event.target;
        input.value = formatPhoneValue(input.value);
    }
    document.addEventListener('input', function(e) { if (e.target.classList.contains('phone-input')) phoneMask(e); });
</script>
{% endblock %}
